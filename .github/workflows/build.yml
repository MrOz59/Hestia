---
name: Build
permissions:
  contents: read

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - master
  # Manual runs can opt into the heavier / non-focus targets (AppImage
  # packaging, Steam Link, Windows, macOS) that aren't part of the default
  # push/PR signal.
  workflow_dispatch:
    inputs:
      build_appimage:
        description: 'Build the Linux AppImage package'
        type: boolean
        default: true
      build_steamlink:
        description: 'Build the Steam Link target'
        type: boolean
        default: false
      build_windows_macos:
        description: 'Build Windows and macOS (currently unsupported / best-effort)'
        type: boolean
        default: false

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      ci_version: ${{ steps.set-ci-version.outputs.ci_version }}
    steps:
      - name: Set CI version
        id: set-ci-version
        shell: bash
        run: |
          CI_VERSION=`echo ${GITHUB_SHA} | cut -c1-6`
          echo "ci_version=${CI_VERSION}" >> "${GITHUB_OUTPUT}"

  # Primary signal: the client builds on Linux. Always runs.
  build-linux:
    needs: setup
    uses: ./.github/workflows/build-linux.yml
    with:
      ci_version: ${{ needs.setup.outputs.ci_version }}

  # Distributable package for the focus platform (Arch/CachyOS). Runs by default.
  build-arch:
    needs: setup
    uses: ./.github/workflows/build-arch.yml
    with:
      ci_version: ${{ needs.setup.outputs.ci_version }}

  # Opt-in targets. These only run on a manual dispatch with the matching input
  # enabled, so a red Windows/macOS/AppImage build never blocks normal CI.
  build-appimage:
    needs: setup
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.build_appimage }}
    uses: ./.github/workflows/build-appimage.yml
    with:
      ci_version: ${{ needs.setup.outputs.ci_version }}

  build-steamlink:
    needs: setup
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.build_steamlink }}
    uses: ./.github/workflows/build-steamlink.yml
    with:
      ci_version: ${{ needs.setup.outputs.ci_version }}

  build-windows-macos:
    needs: setup
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.build_windows_macos }}
    uses: ./.github/workflows/build-win-mac.yml
    with:
      ci_version: ${{ needs.setup.outputs.ci_version }}

  # ===========================================
  # Tagged release (on a v* tag)
  # ===========================================
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-linux, build-arch]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v6
        with:
          path: artifacts/

      - name: List artifacts
        run: find artifacts/ -type f

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ===========================================
  # Nightly (rolling prerelease on master)
  # ===========================================
  # Every successful push to master refreshes the single "nightly" prerelease
  # with the latest Linux artifacts. The tag is force-moved to the current
  # commit so the release always points at the newest build.
  nightly:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: [build-linux, build-arch]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Read version
        id: version
        run: echo "version=$(cat app/version.txt)" >> "$GITHUB_OUTPUT"

      - name: Download all build artifacts
        uses: actions/download-artifact@v6
        with:
          path: artifacts/

      - name: List artifacts
        run: find artifacts/ -type f

      - name: Move nightly tag to current commit
        run: |
          git tag -f nightly "${GITHUB_SHA}"
          git push -f origin "refs/tags/nightly"

      - name: Clear stale nightly assets
        run: |
          # Drop the old assets so a version bump never leaves stale-versioned
          # files behind. Ignores the case where the release doesn't exist yet.
          for asset in $(gh release view nightly --json assets -q '.assets[].name' 2>/dev/null); do
            gh release delete-asset nightly "$asset" --yes || true
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish nightly release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: "Hestia nightly (v${{ steps.version.outputs.version }})"
          body: |
            Rolling nightly build of the Hestia client from the `master` branch.

            - Version: `v${{ steps.version.outputs.version }}`
            - Commit: ${{ github.sha }}

            > Artifacts are rebuilt on every push to `master` and may be
            > unstable. Linux is the focus platform (see the README). For stable
            > builds, see the tagged (non-prerelease) entries.
          files: artifacts/**/*
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
